name: 🐛 Bug Report
description: 报告 SHG 使用中发现的 Bug 或异常行为
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提交 Bug Report！请尽量填写以下信息，帮助我们快速定位和修复问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简要描述这个 Bug 是什么
      placeholder: 运行 health-check.sh 后，扫描结果中的依赖版本显示为 null
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何复现这个 Bug？越详细越好
      placeholder: |
        1. 克隆仓库到本地
        2. 执行 python scripts/scanner.py --path ~/.workbuddy/skills
        3. 观察输出...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望的正确行为是什么？
      placeholder: 应该正确显示每个 Skill 的 Python 版本号

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
      placeholder: 版本号列全部显示为 "N/A" 或空值

  - type: input
    id: environment
    attributes:
      label: 运行环境
      description: 操作系统 + Python 版本
      placeholder: macOS 15.3 / Python 3.13.1

  - type: input
    id: shg-version
    attributes:
      label: SHG 版本
      description: 可通过 git log --oneline -1 查看
      placeholder: v0.1.0 (commit 74d560c)

  - type: textarea
    id: logs
    attributes:
      label: 日志/截图
      description: 终端输出或截图（可粘贴或拖拽）
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: 确认清单
      options:
        - label: 我已搜索过现有 Issues，确认没有重复报告
          required: true
        - label: 问题在最新代码上可以稳定复现
          required: false

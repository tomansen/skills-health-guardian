# 🗨️ Discussions 欢迎指南

感谢访问 SHG 社区！这里是讨论、提问和分享的最佳场所。

## 📌 分类说明

| 分类 | 适用场景 |
|------|----------|
| **💡 Ideas** | 新功能建议、改进想法 |
| **❓ Q&A** | 使用问题、安装帮助、配置咨询 |
| **📊 Show & Tell** | 分享扫描结果、使用心得、部署案例 |
| **🔧 Troubleshooting** | 排查问题、错误诊断 |

## 💬 发帖前请确认

1. 已阅读 [README](../README.md) 和 [快速开始](../docs/quickstart-guide.md)
2. 已搜索过现有 Discussions，避免重复
3. Bug 请用 [Issues](../../issues/new/choose) 提交

## 🤝 行为准则

- 保持友善和专业
- 帮助新人，分享知识
- 尊重不同技术选择

---

**SHG 是开源项目，欢迎每一位贡献者！** 🎉

# Skills Health Guardian — CI 流水线
# 触发: push to main / PR to main
# 检查: lint → test (with coverage) → health-check script

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ============================================================
  #  Job 1: Lint + Test + Health Check（矩阵测试）
  # ============================================================
  ci:
    name: "Python ${{ matrix.python-version }} · ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        os: [ubuntu-latest]
    timeout-minutes: 10

    steps:
      # --- 1. Checkout ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- 2. Setup Python ---
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # --- 3. Install dependencies ---
      - name: Install project + test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install -r requirements-test.txt
          pip install ruff

      # --- 4. Lint (ruff) ---
      - name: Lint with ruff
        run: |
          ruff check scripts/ tests/ --output-format=github
          ruff format --check scripts/ tests/

      # --- 5. Test with coverage ---
      - name: Run tests with pytest + coverage
        run: |
          pytest tests/ \
            --cov=scripts \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=40 \
            -v

      # --- 6. Upload coverage (only on 3.13) ---
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

      # --- 7. Health-check script smoke test ---
      - name: Smoke test health-check.sh
        run: |
          chmod +x scripts/health-check.sh

          # 创建一个临时 skills 目录用于 CI 测试
          mkdir -p /tmp/test-skills/ci-skill
          cat > /tmp/test-skills/ci-skill/SKILL.md << 'EOF'
          ---
          name: ci-skill
          description: CI smoke test skill
          ---
          # CI Test Skill
          EOF

          # 用 --path 指向临时目录，验证脚本可正常执行
          bash scripts/health-check.sh --path /tmp/test-skills --dry-run || echo "[INFO] health-check exited non-zero (expected in CI without real skills)"

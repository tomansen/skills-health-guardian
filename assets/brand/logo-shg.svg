<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!--
    Skills Health Guardian (SHG) — 主 Logo
    设计理念: 抽象字母 S + 脉冲波形态
    方向 C: 极简、高辨识度、单色可逆
    
    核心元素:
    - S 字母变形为脉冲/扫描波形
    - 外圈代表守护盾牌的抽象化
    - 内部脉冲线代表健康信号监测
  -->
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="shg-primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="shg-pulse-grad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  
  <!-- 背景圆角矩形（可选填充） -->
  <rect x="16" y="16" width="224" height="224" rx="40" fill="#0d1117"/>
  
  <!-- 外圈 — 抽象盾牌轮廓（S 形曲线） -->
  <path
    d="M128 36
       C172 36 208 60 220 96
       C228 122 222 152 204 176
       C184 202 156 218 128 220
       C100 218 72 202 52 176
       C34 152 28 122 36 96
       C48 60 84 36 128 36Z"
    fill="none"
    stroke="url(#shg-primary-grad)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  
  <!-- 核心 S 形脉冲波 — 代表 Scan + Signal + Health -->
  <path
    d="M70 128
       L95 128
       L108 88
       L124 168
       L140 108
       L152 148
       L165 128
       L186 128"
    fill="none"
    stroke="url(#shg-pulse-grad)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  
  <!-- 脉冲点 — 心跳/扫描指示器 -->
  <circle cx="124" cy="168" r="6" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- 扫描弧线 — 左上角动态感 -->
  <path
    d="M64 80 Q82 56 112 52"
    fill="none"
    stroke="#06b6d4"
    stroke-width="3"
    stroke-linecap="round"
    opacity="0.7"
  >
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" repeatCount="indefinite"/>
  </path>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!--
    SHG — 错误/异常状态图标 (Error)
    用途: 关键依赖缺失、安全漏洞、阻塞性问题
    设计: 圆形 + X 标记 + 脉冲警告效果
  -->
  <defs>
    <linearGradient id="error-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  
  <!-- 外层光晕 -->
  <circle cx="24" cy="24" r="23" fill="url(#error-glow)"/>
  
  <!-- 主圆背景 -->
  <circle cx="24" cy="24" r="20" fill="#ef4444"/>
  
  <!-- X 标记 -->
  <path
    d="M15.5 15.5 L32.5 32.5 M32.5 15.5 L15.5 32.5"
    stroke="#ffffff"
    stroke-width="3.5"
    stroke-linecap="round"
  />
  
  <!-- 脉冲警告环 -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0">
    <animate attributeName="r" values="20;26;20" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>